# Server
server.port=${APP_PORT:8080}

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mareo_envios}
spring.datasource.username=${DB_USERNAME:mareo_user}
spring.datasource.password=${DB_PASSWORD:mareo_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# Redis Cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Actuator / Metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus,hikaricp
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true
management.metrics.enable.system=true
management.metrics.enable.hikaricp=true

# Jackson
# Spring Boot auto-configures JavaTimeModule (LocalDate/LocalDateTime como ISO-8601)
# cuando jackson-datatype-jsr310 está en el classpath (incluido via spring-boot-starter-web).
# No se define un ObjectMapper personalizado para no interferir con la auto-configuración de Spring MVC.
spring.jackson.serialization.write-dates-as-timestamps=false

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Retry (used via maxAttemptsExpression in @Retryable)
spring.retry.max-attempts=3
